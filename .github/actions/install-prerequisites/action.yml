---

name: Install Eppie Prerequisites

inputs:
  uno-platform:
    type: boolean
    default: false

  uno-check-skip:
    type: string
    default: 'git xcode vswin vsmac windowshyperv edgewebview2 openjdk androidsdk androidemulator dotnetnewunotemplates'

  msbuild:
    type: boolean
    default: false

  xcode-app:
    type: string
    default: '/Applications/Xcode_26.0.1.app' # https://github.com/actions/runner-images/blob/main/images/macos/macos-15-Readme.md#xcode

runs:
  using: "composite"

  steps:
    - name: Setup msbuild
      if: inputs.msbuild == 'true'
      uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3.0.0

    - name: Switch Xcode version 
      if: runner.os == 'macOS' && inputs.xcode-app != ''
      shell: bash
      run: |
        sudo xcode-select -switch ${{ inputs.xcode-app }}

    - name: Setup the Uno Platform
      if: inputs.uno-platform == 'true'
      uses: finebits/github-actions/devhub/uno-platform/setup@3b3b9346c9a22b70e763cbe808ea82eb1e3e8afd # v3.0.1
      with:
        uno-check-skip: ${{ inputs.uno-check-skip }}
